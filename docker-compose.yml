services:
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
      build: .
      container_name: qdrant-api
      ports:
        - "3000:3000"
      depends_on:
        - qdrant
      environment:
        - QDRANT_URL=http://qdrant:6333

volumes:
  qdrant_data: